spring:
  application:
    name: cardex-api

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

pokemon-tcg:
  base-url: https://api.pokemontcg.io/v2
  api-key: ${POKEMON_TCG_API_KEY}